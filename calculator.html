<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{text-align: center;
        }
        .calcy{
           box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
           height: 480px;
           width:520px;
           border-radius: 12px;
           /* display: grid; */
           /* grid-template-columns: repeat(4,1fr); */
           margin:auto;
           padding: 10px;
        }
        #input{
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
            height:50px;
            width:450px;
            margin:auto;
            margin-top: 30px;
            margin-bottom: 30px;
            border-radius: 12px;
            
        }
        #keyboard{
           box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
            display:grid;
            grid-template-columns: repeat(4,1fr);
            gap:20px;
            margin-left: 20px;
            margin-right: 20px;
            padding: 20px;
            border-radius: 12px;
        }
       #keyboard>div{
        width:60px;
        height:40px;
        box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
        border-radius: 12px;
       padding-top: 25px;
       }
       #blk{
        background-color: black;
        color:aliceblue;
        font-weight: bolder;
       }
       #red{
        background-color: red;
        font-weight: bolder;
        color: white;
       }
       #keyboard>div:hover{
        cursor:pointer;
        background-color: rgb(176, 248, 248);
       }
    </style>
</head>
<body>
    <div class="calcy">
        <div id="input"></div>
        <div id="keyboard">
        <div id="one">1</div>
        <div id="two">2</div>
        <div id="three">3</div>
        <div id="blk">+</div>
        <div id="four">4</div>
        <div id="five">5</div>
        <div id="six">6</div>
        <div id="blk">-</div>
        <div id="seven">7</div>
        <div id="eight">8</div>
        <div id="nine">9</div>
        <div id="blk">*</div>
        <div id="red">C</div>
        <div id="zero">0</div>
        <div id="blk">=</div>
        <div id="blk">/</div>
        </div>
    </div>
</body>
</html>
<script>
    let bag = ""
    // step -1 select/ catch the element
    const keys = document.querySelectorAll("#keyboard > div")
    // console.log(keys);

    // step -2 attach event
    for(let i = 0; i <keys.length;i++){
        // console.log(keys[i])
        // const display = document.querySelector("#input")
        keys[i].addEventListener("click",mycal)
    }
     const display = document.querySelector("#input")
    // step -3 handle event
    function mycal(e){
        let targetNumber = e.target.innerText
        // console.log(targetnumber)
        if(targetNumber == "C"){
            bag = ""
            display.innerText = bag;
        }else if(targetNumber == "="){
            let ans = eval(bag)
            display.innerText = ans;
        }else{
            bag += targetNumber;
            display.innerText = bag;
        }
    }
</script>
