<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital management_App</title>
    <!-- <link rel="stylesheet" href="index.css"> -->
    <style>
     .cont{
    box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
    width: 500px; 
    display:flex;
    padding: 30px;
    margin:100px;
}
#submit{
    height: 30px;
    width: 400px;
    border-radius: 15px;
    background-color: rgb(17, 181, 214);
    color:aliceblue;
}
.Hospital{
    display:flex;
    width: 50px;
    flex-shrink: 1;
    /* align-items: center; ; */
    justify-content: space-around;
    margin:90px;
}
#manage{
    color: rgb(146, 192, 232);
    padding: 100px;
}
</style>
</head>
<body>
     <div class="Hospital">            
    <div class="cont">
  <form id="myform">
    <label for="name">The Doctor:</label>
    <input type="text" id="name" placeholder="The Doctor" name="name"><br><br><br>
    <label for="id">Doctor ID:</label>
    <input type="Id" id="id" placeholder="Doctor ID" name="id"><br><br><br>
     <label for="spec">Specialisation:</label>
     <select name="spec" id="spec">
        <option value="Dermatologist">Dermatologist</option>
        <option value="ENT">ENT</option>
        <option value="Dentist">Dentist</option>
        <option value="Gynaecologist">Gynaecologist</option>
        <option value="COVID">COVID</option>
     </select><br><br><br>
    <label for="NO">Experience in Years:</label>
    <input type="number" id="NO" placeholder="Experience in Years" name="NO"><br><br><br>
    <label for="email">Email Address:</label>
    <input type="Email" id="email" placeholder="Email Address" name="email"><br><br><br>
    <label for="num">Mobile Number:</label>
    <input type="number" id="num" placeholder="Mobile Number" name="num"><br><br><br>
    <label for="name">Role:</label>
    <input type="text" id="role" placeholder="The Doctor" name="name"><br><br><br>
    <input type="submit" id="submit">
  </form>
  </div>
  <div id="manage">
  <table border="1px" cellpadding="15px"cellspacing="0px" style="background-color: rgb(153, 227, 244); color: azure;border-radius: 5px; border: 1px solid rgb(12, 17, 18)">
    <thead>
    <tr>
        <th>Name</th>
        <th>Doctor ID</th>
        <th>Specialisation</th>
        <th>Experience in years</th>
        <th>Email address</th>
        <th>Mobile Number</th>
        <th>Role</th>
        <th>Delete</th>
    </tr>
    </thead>
    <tbody>
      
    </tbody>
  </table>
  </div>
  </div>
</body>
</html>
<script>
let todoArr = JSON.parse(localStorage.getItem("todo"))||[];
let favArr = JSON.parse(localStorage.getItem("fav"))||[];
displayTable(todoArr);
document.querySelector("#myform").addEventListener("submit",getdata)

function getdata(e){

e.preventDefault()

let Name = document.querySelector("#name").value

let ID = document.querySelector("#id").value

let Spec = document.querySelector("#spec").value

let exp = document.querySelector("#NO").value

let Email = document.querySelector("#email").value

let mob = document.querySelector("#num").value

let Role = document.querySelector("#role").value

let taskobj = {
    Name , ID , Spec , exp , Email , mob , Role
}
todoArr.push(taskobj);

console.log(todoArr);
localStorage.setItem("todo",JSON.stringify(todoArr));

displayTable(todoArr)
}
function displayTable(Arr){
     document.querySelector("tbody").innerText = ""
     Arr.forEach((el) => {
     const row = document.createElement("tr");
     const td1 = document.createElement("td");
     td1.innerText = el.Name;
     const td2 = document.createElement("td");
     td2.innerText = el.ID;
     const td3 = document.createElement("td");
     td3.innerText = el.Spec;
     const td4 = document.createElement("td");
     td4.innerText = el.exp;
     const td5 = document.createElement("td");
     td5.innerText = el.Email;
     const td6 = document.createElement("td");
     td6.innerText = el.mob;
     const td7 = document.createElement("td");
     td7.innerText = el.Role;
     const td8 = document.createElement("button");
     td8.innerText = "delete";
     td8.addEventListener("click", function(){
     favArr.push(el);
     localStorage.setItem("fav",JSON.stringify(favArr));
     alert("todo added to fav list")
     })
     row.append(td1,td2,td3,td4,td5,td6,td7,td8);
     document.querySelector("tbody").append(row); 
     });
}

 


</script>
