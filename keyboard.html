<style>
    .calcy{
        box-shadow: rgba(0, 0, 0, 0.15) 0px 15px 25px, rgba(0, 0, 0, 0.05) 0px 5px 10px;
        width:fit-content;
        height: auto;
        margin:auto;
        margin-top: 100px;
        display: grid;
        grid-template-columns: repeat(12,auto);
        column-gap: 0;
        justify-content: start;
        border-radius: 5px;
        padding: 20px;
        grid-template-rows: repeat(5, auto);
        position: relative;
        background-color: #f1e9cb;
    }
    .space-key {
    box-shadow: rgba(0, 0, 0, 0.15) 0px 15px 25px, rgba(0, 0, 0, 0.05) 0px 5px 10px;
    height: 30px;
    width: 216px; 
    margin: 2px;
    border-radius: 5px;
    text-align: center;
    padding-top: 10px;
    grid-column: 5 / 9; 
    grid-row: 5;
    position: absolute;
    bottom: 20px;        
    left: 2px;
    color: rgb(69, 188, 69);
    background-color: rgb(242, 215, 219); 
 }
 .enter-key {
   box-shadow: rgba(60, 64, 67, 0.3) 0px 1px 2px 0px, rgba(60, 64, 67, 0.15) 0px 1px 3px 1px;
    height: 32px;
    width: 110px;
    border-radius: 5px;
    text-align: center;
    padding-top: 10px;
    position: absolute;
    bottom: 17px;   
    right: 18px;
    color:rgb(89, 224, 132);
    background-color: rgb(242, 215, 219); 
 } 
 .shift-key {
    box-shadow: rgba(0, 0, 0, 0.15) 2.4px 2.4px 3.2px;
