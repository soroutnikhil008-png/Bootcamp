<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naptol</title>

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    min-height: 100vh;
    padding: 30px;
}

h1 {
    text-align: center;
    font-size: 40px;
    color: #1e293b;
    margin-bottom: 30px;
    letter-spacing: 1px;
    text-shadow: 1px 2px 8px rgba(0,0,0,0.1);
}

#search,
#sort {
    width: 280px;
    padding: 14px 18px;
    margin: 10px;
    border: none;
    outline: none;
    border-radius: 50px;
    background: white;
    box-shadow: 0 8px 20px rgba(0,0,0,.12);
    font-size: 16px;
    transition: .3s;
}

#search:focus,
#sort:focus {
    transform: scale(1.05);
    box-shadow: 0 0 0 4px rgba(59,130,246,.25);
}

#root {
    width: 95%;
    margin: 40px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 35px;
}

#root>div {
    background: white;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 12px 35px rgba(0,0,0,.12);
    transition: .4s;
    display: flex;
    flex-direction: column;
    position: relative;
}

#root>div:hover {
    transform: translateY(-12px) scale(1.02);
    box-shadow: 0 25px 45px rgba(0,0,0,.2);
}

#root>div::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg,#3b82f6,#06b6d4,#22c55e);
}

img {
    width: 100%;
    height: 280px;
    object-fit: contain;
    background: #f8fafc;
    padding: 20px;
    transition: .4s;
}

#root>div:hover img {
    transform: scale(1.08);
}

h3 {
    padding: 8px 18px;
    color: #1f2937;
    font-size: 17px;
    line-height: 1.5;
}

p {
    padding: 0 18px;
    color: #64748b;
    font-size: 14px;
    line-height: 1.6;
    height: 95px;
    overflow: auto;
}

p::-webkit-scrollbar{
    width:4px;
}

p::-webkit-scrollbar-thumb{
    background:#94a3b8;
    border-radius:10px;
}

hr {
    margin: 15px 18px;
    border: none;
    border-top: 1px solid #e2e8f0;
}

button {
    margin: 10px 18px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: .3s;
}

button:nth-of-type(1) {
    background: linear-gradient(135deg,#10b981,#059669);
    color: white;
}

button:nth-of-type(1):hover {
    transform: scale(1.05);
}

button:nth-of-type(2) {
    background: linear-gradient(135deg,#f59e0b,#ea580c);
    color: white;
}

button:nth-of-type(2):hover {
    transform: scale(1.05);
}

button:last-child {
    background: linear-gradient(135deg,#2563eb,#1d4ed8);
    color: white;
    font-size: 16px;
    margin-bottom: 20px;
}

button:last-child:hover {
    background: linear-gradient(135deg,#1d4ed8,#1e40af);
    transform: scale(1.04);
    letter-spacing: 1px;
}

@media(max-width:900px){
    #root{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:600px){
    body{
        padding:15px;
    }

    h1{
        font-size:28px;
    }

    #search,#sort{
        width:95%;
    }

    #root{
        grid-template-columns:1fr;
    }
}
    </style>
</head>

<body>
    <h1>Welcome to Naptol Cart Page</h1>

    <h1 id="total">Total cart value: </h1>

    <div id="root">
        <!-- All Product come here... -->
    </div>
</body>

</html>

<script>

    let cartArr = JSON.parse(localStorage.getItem("cart")) || [];

    displayCart(cartArr)

    const totalCartValue = cartArr.reduce((acc, el) => {
        return acc + el.price
    }, 0)

    console.log(totalCartValue);
    document.querySelector("#total").innerText = `Total cart value: ${totalCartValue} `


    function displayCart(arr) {

        document.querySelector("#root").innerText = ""
        arr.forEach((el, i) => {

            const box = document.createElement("div");

            const image = document.createElement("img");
            image.setAttribute("src", el.image);

            const title = document.createElement("h3");
            title.innerHTML = `<span>Title:</span> ${el.title}`

            const category = document.createElement("h3");
            category.innerText = `Category: ${el.category}`

            const description = document.createElement("p");
            description.innerText = `Description: ${el.description}`

            const price = document.createElement("button");
            price.innerText = `Price: ${el.price}`

            const rating = document.createElement("button");
            rating.innerText = `Rating: ${el.rating.rate}`

            const hrr = document.createElement("hr");

            const removebtn = document.createElement("button");
            removebtn.innerText = "Remove"

            removebtn.addEventListener("click", function () {
                cartArr.splice(i, 1)

                localStorage.setItem("cart", JSON.stringify(cartArr));
                alert("Product Removed from cart")
                displayCart(cartArr)
                const totalCartValue = cartArr.reduce((acc, el) => {
                    return acc + el.price
                }, 0)

                console.log(totalCartValue);
                document.querySelector("#total").innerText = `Total cart value: ${totalCartValue} `



            })

            box.append(image, title, category, description, price, rating, hrr, removebtn);

            document.querySelector("#root").append(box)
        })
    }
</script>
